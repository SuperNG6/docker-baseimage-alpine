name: 测试 docker-aria2 s6 v2 兼容 s6 v3

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "Dockerfile"
      - "install.sh"
      - "root/**"
      - ".github/scripts/test-docker-aria2-s6v3-startup.sh"
      - ".github/workflows/Test Downstream.yml"
  push:
    branches:
      - v3
    paths:
      - "Dockerfile"
      - "install.sh"
      - "root/**"
      - ".github/scripts/test-docker-aria2-s6v3-startup.sh"
      - ".github/workflows/Test Downstream.yml"

permissions:
  contents: read

env:
  BASE_TEST_IMAGE: local/superng6-alpine:test
  DOWNSTREAM_REPO: SuperNG6/docker-aria2
  DOWNSTREAM_REF: dev-refactor-20260521
  DOWNSTREAM_DIR: downstream/docker-aria2
  DOWNSTREAM_TEST_IMAGE: local/superng6-aria2:a2b-test
  DOWNSTREAM_CONTAINER: aria2-downstream-s6-smoke

jobs:
  docker-aria2-s6-compat:
    name: 用 docker-aria2 验证 s6 v3 base 启动兼容
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 检出 base 镜像代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建当前 s6 v3 base 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          build-args: |
            VERSION=3.23.4
          tags: ${{ env.BASE_TEST_IMAGE }}
          load: true

      - name: 检出 docker-aria2 s6 v2 风格下游
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DOWNSTREAM_REPO }}
          ref: ${{ env.DOWNSTREAM_REF }}
          path: ${{ env.DOWNSTREAM_DIR }}

      - name: 替换 docker-aria2 base 并保留 v2 风格入口
        working-directory: ${{ env.DOWNSTREAM_DIR }}
        run: |
          set -euo pipefail
          echo "替换前："
          grep -nE '^FROM ' Dockerfile

          perl -0pi -e 's{^(FROM\s+)(?:ghcr\.io/)?superng6/alpine(?::[^\s]+)?(\s*(?:AS\s+\S+)?)$}{$1$ENV{BASE_TEST_IMAGE}$2}gmi' Dockerfile

          echo "替换后："
          grep -nE '^FROM ' Dockerfile
          if grep -qE '^(FROM\s+)(?:ghcr\.io/)?superng6/alpine' Dockerfile; then
            echo "仍存在未替换的 superng6/alpine FROM"
            exit 1
          fi

          test -d root/etc/cont-init.d
          test -d root/etc/services.d
          grep -RIl '^#!/usr/bin/with-contenv bash' root/etc/cont-init.d root/etc/services.d
          git ls-files -s root/etc/cont-init.d root/etc/services.d

      - name: 构建 docker-aria2 aria2b 镜像
        working-directory: ${{ env.DOWNSTREAM_DIR }}
        run: |
          set -euo pipefail
          docker build \
            --build-arg VARIANT=a2b \
            --build-arg A2B_DEFAULT=true \
            -t "${DOWNSTREAM_TEST_IMAGE}" \
            .

      - name: 启动 docker-aria2 s6 兼容性容器
        run: |
          set -euo pipefail
          mkdir -p /tmp/aria2-s6-smoke/config /tmp/aria2-s6-smoke/downloads
          docker run -d \
            --name "${DOWNSTREAM_CONTAINER}" \
            -p 16800:6800 \
            -p 18080:8080 \
            -e PUID=1001 \
            -e PGID=1001 \
            -e SECRET=smoketoken \
            -e UT=false \
            -e RUT=false \
            -e WEBUI=true \
            -e PORT=6800 \
            -e WEBUI_PORT=8080 \
            -e A2B=true \
            -e A2B_DISABLE_LOG=false \
            -e CRA2B=false \
            -v /tmp/aria2-s6-smoke/config:/config \
            -v /tmp/aria2-s6-smoke/downloads:/downloads \
            "${DOWNSTREAM_TEST_IMAGE}"

      - name: 验证 docker-aria2 启动到运行的 s6 v3 流程
        run: |
          set -euo pipefail
          bash .github/scripts/test-docker-aria2-s6v3-startup.sh \
            "${DOWNSTREAM_CONTAINER}" \
            "${DOWNSTREAM_TEST_IMAGE}" \
            "http://127.0.0.1:16800/jsonrpc" \
            "http://127.0.0.1:18080/" \
            "smoketoken" \
            "a2b"

      - name: 输出容器日志和 s6 诊断
        if: always()
        run: |
          set +e
          echo "::group::docker container state"
          docker ps -a --filter "name=${DOWNSTREAM_CONTAINER}"
          docker inspect "${DOWNSTREAM_CONTAINER}" \
            --format 'status={{.State.Status}} exit={{.State.ExitCode}} started={{.State.StartedAt}} finished={{.State.FinishedAt}} image={{.Config.Image}}' || true
          echo "::endgroup::"

          echo "::group::docker logs"
          docker logs "${DOWNSTREAM_CONTAINER}" || true
          echo "::endgroup::"

          echo "::group::s6 and process diagnostics"
          docker exec "${DOWNSTREAM_CONTAINER}" sh -c '
            set +e
            echo "-- service directories --"
            for dir in /etc/services.d /run/service /run/s6/legacy-services; do
              if [ -d "${dir}" ]; then
                echo "${dir}"
                find "${dir}" -maxdepth 2 -mindepth 1 -print | sort
              fi
            done

            echo "-- s6 service status --"
            for svc in aria2 aria2b; do
              for dir in "/run/service/${svc}" "/run/s6/legacy-services/${svc}"; do
                if [ -d "${dir}" ]; then
                  printf "%s: " "${dir}"
                  s6-svstat "${dir}" || true
                fi
              done
            done

            echo "-- processes --"
            ps -eo pid,ppid,user,group,args

            echo "-- selected pids --"
            for name in aria2c aria2b darkhttpd crond; do
              printf "%s: " "${name}"
              pgrep -a "${name}" || echo "not running"
            done

            echo "-- selected env --"
            for key in PUID PGID PORT WEBUI WEBUI_PORT A2B A2B_DISABLE_LOG CRA2B UT RUT; do
              if [ -f "/run/s6/container_environment/${key}" ]; then
                printf "%s=" "${key}"
                cat "/run/s6/container_environment/${key}"
                echo
              fi
            done

            echo "-- selected aria2.conf --"
            grep -E "^(rpc-listen-port|rpc-secret|dht-listen-port|listen-port|on-download-complete)=" /config/aria2.conf || true
          ' || true
          echo "::endgroup::"

      - name: 清理容器
        if: always()
        run: docker rm -f "${DOWNSTREAM_CONTAINER}" "${DOWNSTREAM_CONTAINER}-default-secret" || true
