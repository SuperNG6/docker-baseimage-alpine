name: 测试 s6 v3 base 兼容性

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "Dockerfile"
      - "install.sh"
      - "root/**"
      - ".github/workflows/Test Downstream.yml"
  push:
    branches:
      - v3
    paths:
      - "Dockerfile"
      - "install.sh"
      - "root/**"
      - ".github/workflows/Test Downstream.yml"

permissions:
  contents: read

env:
  BASE_TEST_IMAGE: local/superng6-alpine:test
  S6_FIXTURE_IMAGE: local/superng6-alpine-s6-fixture:test
  S6_FIXTURE_CONTAINER: s6-base-contract

jobs:
  s6-base-contract:
    name: 验证 s6 v3 base 启动与 v2 风格兼容
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 检出 base 镜像代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建当前 base 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          build-args: |
            VERSION=3.23.4
          tags: ${{ env.BASE_TEST_IMAGE }}
          load: true

      - name: 构建 s6 v2 风格兼容测试镜像
        run: |
          set -euo pipefail
          fixture=/tmp/s6-base-fixture
          rm -rf "${fixture}"
          mkdir -p \
            "${fixture}/root/etc/cont-init.d" \
            "${fixture}/root/etc/services.d/legacy-worker"

          cat > "${fixture}/Dockerfile" <<'EOF'
          FROM local/superng6-alpine:test
          COPY root/ /
          RUN chmod +x /etc/cont-init.d/* /etc/services.d/*/run
          EOF

          cat > "${fixture}/root/etc/cont-init.d/20-contract" <<'EOF'
          #!/usr/bin/with-contenv bash
          set -euo pipefail
          mkdir -p /tmp/s6-contract

          {
            echo "PUID=$(cat /run/s6/container_environment/PUID)"
            echo "PGID=$(cat /run/s6/container_environment/PGID)"
            echo "abc=$(id -u abc):$(id -g abc)"
            echo "secret=$(cat /run/s6/container_environment/SECRET_FROM_FILE)"
            echo "config_owner=$(stat -c '%u:%g' /config)"
            echo "defaults_owner=$(stat -c '%u:%g' /defaults)"
          } > /tmp/s6-contract/cont-init.env

          test "$(id -u abc)" = "1001"
          test "$(id -g abc)" = "1001"
          test "$(cat /run/s6/container_environment/SECRET_FROM_FILE)" = "file-secret-value"
          test "$(stat -c '%u:%g' /config)" = "1001:1001"
          test "$(stat -c '%u:%g' /defaults)" = "1001:1001"
          EOF

          cat > "${fixture}/root/etc/services.d/legacy-worker/run" <<'EOF'
          #!/usr/bin/with-contenv bash
          set -euo pipefail
          mkdir -p /tmp/s6-contract

          count_file=/tmp/s6-contract/start-count
          count=0
          [ -f "${count_file}" ] && count="$(cat "${count_file}")"
          count=$((count + 1))
          echo "${count}" > "${count_file}"

          {
            echo "PUID=${PUID}"
            echo "PGID=${PGID}"
            echo "SECRET_FROM_FILE=${SECRET_FROM_FILE}"
            echo "UMASK=${UMASK}"
            echo "start_count=${count}"
          } > /tmp/s6-contract/service-env

          touch /tmp/s6-contract/umask-file
          stat -c '%a' /tmp/s6-contract/umask-file > /tmp/s6-contract/umask-mode
          printf '\033[1;32mfixture service ready: start=%s\033[0m\n' "${count}"

          trap 'echo TERM >> /tmp/s6-contract/signals; exit 0' TERM
          while :; do
            sleep 1
          done
          EOF

          docker build -t "${S6_FIXTURE_IMAGE}" "${fixture}"

      - name: 启动 s6 base 契约容器
        run: |
          set -euo pipefail
          mkdir -p /tmp/s6-base-contract/config /tmp/s6-base-contract/secret
          printf 'file-secret-value' > /tmp/s6-base-contract/secret/source

          docker run -d \
            --name "${S6_FIXTURE_CONTAINER}" \
            -e PUID=1001 \
            -e PGID=1001 \
            -e UMASK=0027 \
            -e FILE__SECRET_FROM_FILE=/run/contract-secret/source \
            -v /tmp/s6-base-contract/config:/config \
            -v /tmp/s6-base-contract/secret:/run/contract-secret:ro \
            "${S6_FIXTURE_IMAGE}"

      - name: 验证 s6 v3 启动流程与 v2 风格兼容
        run: |
          set -euo pipefail
          service_dir=""
          last_error="legacy service has not appeared yet"

          for i in {1..30}; do
            service_dir="$(
              docker exec "${S6_FIXTURE_CONTAINER}" sh -c '
                for dir in /run/service/legacy-worker /run/s6/legacy-services/legacy-worker; do
                  if [ -d "${dir}" ]; then
                    echo "${dir}"
                    exit 0
                  fi
                done
                exit 1
              ' 2>/tmp/s6-contract-service.err || true
            )"

            if [ -n "${service_dir}" ] &&
              docker exec "${S6_FIXTURE_CONTAINER}" s6-svwait -u -t 1000 "${service_dir}" >/dev/null 2>/tmp/s6-contract-svwait.err &&
              test "$(docker exec "${S6_FIXTURE_CONTAINER}" cat /tmp/s6-contract/start-count 2>/dev/null)" = "1"; then
              break
            fi

            s6_state="$(
              if [ -n "${service_dir}" ]; then
                docker exec "${S6_FIXTURE_CONTAINER}" s6-svstat "${service_dir}" 2>&1 || true
              fi
            )"
            last_error="${s6_state:-$(cat /tmp/s6-contract-service.err 2>/dev/null || echo waiting)}"
            if [ $((i % 5)) -eq 0 ]; then
              echo "Waiting for s6 fixture legacy service (${i}/30): ${last_error}"
              docker logs --tail 80 "${S6_FIXTURE_CONTAINER}" || true
            fi
            sleep 1
          done

          test -n "${service_dir}"
          docker exec "${S6_FIXTURE_CONTAINER}" s6-svstat "${service_dir}" | grep -q '^up'

          docker exec "${S6_FIXTURE_CONTAINER}" grep -qx 'PUID=1001' /tmp/s6-contract/cont-init.env
          docker exec "${S6_FIXTURE_CONTAINER}" grep -qx 'PGID=1001' /tmp/s6-contract/cont-init.env
          docker exec "${S6_FIXTURE_CONTAINER}" grep -qx 'abc=1001:1001' /tmp/s6-contract/cont-init.env
          docker exec "${S6_FIXTURE_CONTAINER}" grep -qx 'secret=file-secret-value' /tmp/s6-contract/cont-init.env
          docker exec "${S6_FIXTURE_CONTAINER}" grep -qx 'config_owner=1001:1001' /tmp/s6-contract/cont-init.env
          docker exec "${S6_FIXTURE_CONTAINER}" grep -qx 'defaults_owner=1001:1001' /tmp/s6-contract/cont-init.env

          docker exec "${S6_FIXTURE_CONTAINER}" grep -qx 'PUID=1001' /tmp/s6-contract/service-env
          docker exec "${S6_FIXTURE_CONTAINER}" grep -qx 'PGID=1001' /tmp/s6-contract/service-env
          docker exec "${S6_FIXTURE_CONTAINER}" grep -qx 'SECRET_FROM_FILE=file-secret-value' /tmp/s6-contract/service-env
          docker exec "${S6_FIXTURE_CONTAINER}" grep -qx 'UMASK=0027' /tmp/s6-contract/service-env
          test "$(docker exec "${S6_FIXTURE_CONTAINER}" cat /tmp/s6-contract/umask-mode)" = "640"

      - name: 验证 s6 supervision 会重启 legacy service
        run: |
          set -euo pipefail
          service_dir="$(
            docker exec "${S6_FIXTURE_CONTAINER}" sh -c '
              for dir in /run/service/legacy-worker /run/s6/legacy-services/legacy-worker; do
                if [ -d "${dir}" ]; then
                  echo "${dir}"
                  exit 0
                fi
              done
              exit 1
            '
          )"
          old_pid="$(docker exec "${S6_FIXTURE_CONTAINER}" s6-svstat "${service_dir}" | sed -n 's/^up (pid \([0-9][0-9]*\).*/\1/p')"
          test -n "${old_pid}"
          docker exec "${S6_FIXTURE_CONTAINER}" kill -TERM "${old_pid}"

          for _ in {1..20}; do
            new_pid="$(docker exec "${S6_FIXTURE_CONTAINER}" s6-svstat "${service_dir}" | sed -n 's/^up (pid \([0-9][0-9]*\).*/\1/p')"
            start_count="$(docker exec "${S6_FIXTURE_CONTAINER}" cat /tmp/s6-contract/start-count 2>/dev/null || true)"
            if [ -n "${new_pid}" ] && [ "${new_pid}" != "${old_pid}" ] && [ "${start_count}" = "2" ]; then
              exit 0
            fi
            sleep 1
          done

          docker exec "${S6_FIXTURE_CONTAINER}" s6-svstat "${service_dir}" || true
          docker logs "${S6_FIXTURE_CONTAINER}" || true
          exit 1

      - name: 验证 docker logs 保留彩色输出
        run: |
          set -euo pipefail
          docker logs "${S6_FIXTURE_CONTAINER}" 2>&1 | tee /tmp/s6-base-contract.log
          grep -q $'\033\\[1;32mfixture service ready' /tmp/s6-base-contract.log

      - name: 验证容器停止信号进入 service
        run: |
          set -euo pipefail
          docker stop --time 10 "${S6_FIXTURE_CONTAINER}"
          docker cp "${S6_FIXTURE_CONTAINER}:/tmp/s6-contract/signals" /tmp/s6-contract-signals
          grep -qx 'TERM' /tmp/s6-contract-signals

      - name: 输出容器日志
        if: always()
        run: docker logs "${S6_FIXTURE_CONTAINER}" || true

      - name: 清理容器
        if: always()
        run: docker rm -f "${S6_FIXTURE_CONTAINER}" || true
